<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>RingHost — set up a new restaurant</title>
<style>
  :root { --ink: #1a1a1a; --cream: #faf7f2; --amber: #c97a3c; --line: #e8e0d4; }
  * { box-sizing: border-box; }
  body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; background: var(--cream); color: var(--ink); }
  .wrap { max-width: 520px; margin: 0 auto; padding: 3rem 1.5rem; }
  h1 { font-size: 1.6rem; margin-bottom: 0.3rem; }
  p.sub { color: #666; margin-top: 0; margin-bottom: 2rem; }
  label { display: block; font-size: 0.9rem; font-weight: 600; margin: 1rem 0 0.3rem; }
  input, textarea, select { width: 100%; padding: 0.7rem 0.9rem; border: 1px solid var(--line); border-radius: 8px; font-size: 1rem; font-family: inherit; }
  textarea { resize: vertical; min-height: 60px; }
  button { margin-top: 1.5rem; width: 100%; background: var(--ink); color: white; border: none; padding: 0.9rem; border-radius: 8px; font-size: 1.05rem; font-weight: 600; cursor: pointer; }
  button:disabled { opacity: 0.6; cursor: default; }
  .result { margin-top: 1.5rem; padding: 1.2rem; border-radius: 8px; background: white; border: 1px solid var(--line); display: none; }
  .result.show { display: block; }
  .result .phone { font-size: 1.6rem; font-weight: 700; color: var(--amber); }
  .error { color: #b3261e; margin-top: 1rem; }
</style>
</head>
<body>
<div class="wrap">
  <h1>Set up a new restaurant</h1>
  <p class="sub">Fill this in once — you get back a real, working phone number for that restaurant.</p>

  <form id="f">
    <label>Restaurant name</label>
    <input name="restaurant_name" required>

    <label>City</label>
    <input name="city">

    <label>Language</label>
    <select name="language">
      <option value="he">Hebrew</option>
      <option value="en">English</option>
    </select>

    <label>Cuisine</label>
    <input name="cuisine" placeholder="e.g. Italian, Middle Eastern">

    <label>Hours</label>
    <textarea name="hours" placeholder="e.g. Sun-Thu 12-11, Fri-Sat 12-1am"></textarea>

    <label>Menu highlights</label>
    <textarea name="menu_highlights" placeholder="A few signature dishes"></textarea>

    <label>Your phone (where booking/escalation notifications reference)</label>
    <input name="owner_phone" placeholder="+972501234567" required>

    <button type="submit">Create the assistant</button>
  </form>

  <div class="error" id="err"></div>

  <div class="result" id="result">
    <div>Live number:</div>
    <div class="phone" id="phone"></div>
    <div style="margin-top:0.8rem; color:#666; font-size:0.9rem;" id="note"></div>
  </div>
</div>

<script>
  const form = document.getElementById("f");
  const result = document.getElementById("result");
  const phoneEl = document.getElementById("phone");
  const noteEl = document.getElementById("note");
  const errEl = document.getElementById("err");

  form.addEventListener("submit", async (e) => {
    e.preventDefault();
    errEl.textContent = "";
    result.classList.remove("show");
    const button = form.querySelector("button");
    button.disabled = true;
    button.textContent = "Setting up...";
    const data = Object.fromEntries(new FormData(form).entries());
    try {
      const res = await fetch("https://ringhost-onboard.s0533495227.workers.dev", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(data),
      });
      const json = await res.json();
      if (!res.ok || json.error) throw new Error(json.error || "Setup failed");
      phoneEl.textContent = json.phoneNumber || "(no number yet — retry)";
      noteEl.textContent = json.note || "Call this number now to test it.";
      result.classList.add("show");
    } catch (err) {
      errEl.textContent = err.message;
    } finally {
      button.disabled = false;
      button.textContent = "Create the assistant";
    }
  });
</script>
</body>
</html>
